<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patagonia Packing List Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background-color: #1a2a1a;
      color: #f0ece0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.2em;
      color: #a8d5a2;
      font-family: 'Arial', sans-serif;
    }

    header p {
      color: #c0bfb0;
      margin-top: 10px;
      font-size: 1.1em;
    }

    .card {
      background-color: #0d1a0d;
      border: 1px solid #4a7c4a;
      border-radius: 10px;
      padding: 30px;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #a8d5a2;
      font-family: 'Arial', sans-serif;
      font-weight: bold;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #4a7c4a;
      background-color: #1a2a1a;
      color: #f0ece0;
      font-size: 1em;
      margin-bottom: 20px;
    }

    .checkbox-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .checkbox-group label {
      color: #f0ece0;
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    input[type="checkbox"] {
      accent-color: #4a7c4a;
      width: 16px;
      height: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #4a7c4a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      font-family: 'Arial', sans-serif;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #5a9c5a;
    }

    #loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: #a8d5a2;
      font-style: italic;
    }

    #result {
      display: none;
    }

    #result h2 {
      color: #a8d5a2;
      font-family: 'Arial', sans-serif;
      margin-bottom: 15px;
    }

    #result-content {
      line-height: 1.9;
      font-size: 1.05em;
      white-space: pre-wrap;
    }

    #result-content h3 {
      color: #a8d5a2;
      margin-top: 20px;
      margin-bottom: 6px;
      font-family: 'Arial', sans-serif;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 30px;
      color: #a8d5a2;
      font-family: 'Arial', sans-serif;
      text-decoration: none;
    }

    .back-link:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .reset-btn {
      background-color: #2a3a2a;
      margin-top: 15px;
      border: 1px solid #4a7c4a;
    }

    .reset-btn:hover {
      background-color: #3a4a3a;
    }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <h1>🎒 Patagonia Packing List Generator</h1>
      <p>Tell us about your trip and we'll build your perfect gear list.</p>
    </header>

    <!-- Input Form -->
    <div class="card" id="form-card">

      <label for="duration">Trip Length (days)</label>
      <input type="number" id="duration" min="1" max="30" value="5" />

      <label for="difficulty">Trail Difficulty</label>
      <select id="difficulty">
        <option value="easy">Easy — casual day hikes</option>
        <option value="moderate" selected>Moderate — W Trek style</option>
        <option value="hard">Hard — O Circuit or technical routes</option>
      </select>

      <label for="season">Season</label>
      <select id="season">
        <option value="summer">Summer (Dec–Feb) — warmest</option>
        <option value="shoulder">Shoulder (Mar, Nov) — unpredictable</option>
        <option value="winter">Winter (Jun–Aug) — cold & harsh</option>
      </select>

      <label>Extra Conditions (check all that apply)</label>
      <div class="checkbox-group">
        <label><input type="checkbox" id="river"> River crossings</label>
        <label><input type="checkbox" id="camping"> Wild camping</label>
        <label><input type="checkbox" id="glacier"> Glacier trekking</label>
        <label><input type="checkbox" id="altitude"> High altitude (3000m+)</label>
        <label><input type="checkbox" id="rain"> Expecting heavy rain</label>
        <label><input type="checkbox" id="solo"> Solo traveler</label>
      </div>

      <button onclick="generateList()">Generate My Packing List</button>
    </div>

    <!-- Loading -->
    <div id="loading">
      ⛰️ Building your custom packing list...
    </div>

    <!-- Result -->
    <div class="card" id="result">
      <h2>Your Custom Packing List</h2>
      <div id="result-content"></div>
      <button class="reset-btn" onclick="resetForm()">← Start Over</button>
    </div>

    <a href="patagonia.html" class="back-link">← Back to Patagonia Page</a>

  </div>

  <script>
    async function generateList() {
      const duration = document.getElementById('duration').value;
      const difficulty = document.getElementById('difficulty').value;
      const season = document.getElementById('season').value;
      const extras = [];
      if (document.getElementById('river').checked) extras.push('river crossings');
      if (document.getElementById('camping').checked) extras.push('wild camping');
      if (document.getElementById('glacier').checked) extras.push('glacier trekking');
      if (document.getElementById('altitude').checked) extras.push('high altitude above 3000m');
      if (document.getElementById('rain').checked) extras.push('heavy rain expected');
      if (document.getElementById('solo').checked) extras.push('solo traveler');

      const extrasText = extras.length > 0
        ? `The hiker will also encounter: ${extras.join(', ')}.`
        : '';

      const prompt = `You are an expert Patagonia hiking guide. Generate a detailed, organized packing list for a hiker with these trip details:
- Trip length: ${duration} days
- Difficulty: ${difficulty}
- Season: ${season}
${extrasText}

Format the list with clear categories using ### for headings (e.g. ### Clothing, ### Shelter, ### Navigation, etc.).
Under each heading use bullet points with a hyphen.
Add a short one-sentence tip after each category in italics starting with "Tip:".
Be specific and practical. Tailor quantities to the trip length.`;

      document.getElementById('form-card').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').style.display = 'none';

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt
