<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patagonia Packing List Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background-color: #1a2a1a;
      color: #f0ece0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.2em;
      color: #a8d5a2;
      font-family: 'Arial', sans-serif;
    }

    header p {
      color: #c0bfb0;
      margin-top: 10px;
      font-size: 1.1em;
    }

    .card {
      background-color: #0d1a0d;
      border: 1px solid #4a7c4a;
      border-radius: 10px;
      padding: 30px;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #a8d5a2;
      font-family: 'Arial', sans-serif;
      font-weight: bold;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #4a7c4a;
      background-color: #1a2a1a;
      color: #f0ece0;
      font-size: 1em;
      margin-bottom: 20px;
    }

    .checkbox-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .checkbox-group label {
      color: #f0ece0;
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    input[type="checkbox"] {
      accent-color: #4a7c4a;
      width: 16px;
      height: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #4a7c4a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      font-family: 'Arial', sans-serif;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover { background-color: #5a9c5a; }

    #result { display: none; }

    #result h2 {
      color: #a8d5a2;
      font-family: 'Arial', sans-serif;
      margin-bottom: 15px;
    }

    .category {
      margin-bottom: 24px;
    }

    .category h3 {
      color: #a8d5a2;
      font-family: 'Arial', sans-serif;
      margin-bottom: 8px;
      font-size: 1.1em;
      border-bottom: 1px solid #4a7c4a;
      padding-bottom: 4px;
    }

    .category ul {
      list-style: none;
      padding: 0;
    }

    .category ul li::before {
      content: "✔ ";
      color: #4a7c4a;
    }

    .category ul li {
      padding: 4px 0;
      line-height: 1.6;
    }

    .tip {
      color: #a8d5a2;
      font-style: italic;
      font-size: 0.95em;
      margin-top: 6px;
    }

    .reset-btn {
      background-color: #2a3a2a;
      margin-top: 15px;
      border: 1px solid #4a7c4a;
    }

    .reset-btn:hover { background-color: #3a4a3a; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 30px;
      color: #a8d5a2;
      font-family: 'Arial', sans-serif;
      text-decoration: none;
    }

    .back-link:hover {
      color: #ffffff;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <h1>🎒 Patagonia Packing List Generator</h1>
      <p>Tell us about your trip and we'll build your perfect gear list.</p>
    </header>

    <div class="card" id="form-card">

      <label for="duration">Trip Length (days)</label>
      <input type="number" id="duration" min="1" max="30" value="5" />

      <label for="difficulty">Trail Difficulty</label>
      <select id="difficulty">
        <option value="easy">Easy — casual day hikes</option>
        <option value="moderate" selected>Moderate — W Trek style</option>
        <option value="hard">Hard — O Circuit or technical routes</option>
      </select>

      <label for="season">Season</label>
      <select id="season">
        <option value="summer">Summer (Dec–Feb) — warmest</option>
        <option value="shoulder">Shoulder (Mar, Nov) — unpredictable</option>
        <option value="winter">Winter (Jun–Aug) — cold & harsh</option>
      </select>

      <label>Extra Conditions (check all that apply)</label>
      <div class="checkbox-group">
        <label><input type="checkbox" id="river"> River crossings</label>
        <label><input type="checkbox" id="camping"> Wild camping</label>
        <label><input type="checkbox" id="glacier"> Glacier trekking</label>
        <label><input type="checkbox" id="altitude"> High altitude (3000m+)</label>
        <label><input type="checkbox" id="rain"> Expecting heavy rain</label>
        <label><input type="checkbox" id="solo"> Solo traveler</label>
      </div>

      <button onclick="generateList()">Generate My Packing List</button>
    </div>

    <div class="card" id="result">
      <h2>Your Custom Packing List</h2>
      <div id="result-content"></div>
      <button class="reset-btn" onclick="resetForm()">← Start Over</button>
    </div>

    <a href="patagonia.html" class="back-link">← Back to Patagonia Page</a>

  </div>

  <script>
    function generateList() {
      const duration = parseInt(document.getElementById('duration').value);
      const difficulty = document.getElementById('difficulty').value;
      const season = document.getElementById('season').value;
      const river = document.getElementById('river').checked;
      const camping = document.getElementById('camping').checked;
      const glacier = document.getElementById('glacier').checked;
      const altitude = document.getElementById('altitude').checked;
      const rain = document.getElementById('rain').checked;
      const solo = document.getElementById('solo').checked;

      const list = [];

      // Clothing
      const clothing = {
        title: "👕 Clothing",
        items: [
          `${Math.ceil(duration / 3)} moisture-wicking base layer tops`,
          `${Math.ceil(duration / 3)} pairs of hiking pants`,
          "1 fleece mid-layer jacket",
          "1 waterproof rain jacket (essential in Patagonia!)",
          `${duration} pairs of merino wool socks`,
          "1 warm beanie hat",
          "1 buff / neck gaiter",
          "Waterproof hiking gloves",
          "Sun hat or cap"
        ],
        tip: "Tip: Patagonia weather can change in minutes — always pack your rain jacket at the top of your bag."
      };
      if (season === "winter") {
        clothing.items.push("Insulated down jacket");
        clothing.items.push("Thermal base layer bottoms");
      }
      if (glacier) clothing.items.push("Gaiters for glacier travel");
      list.push(clothing);

      // Footwear
      const footwear = {
        title: "👟 Footwear",
        items: ["Waterproof hiking boots (broken in before the trip)", "Camp sandals or lightweight shoes"],
        tip: "Tip: Never bring new boots on a long hike — break them in at home first to avoid blisters."
      };
      if (river) footwear.items.push("Trekking sandals or water shoes for crossings");
      list.push(footwear);

      // Shelter & Sleep
      const shelter = {
        title: "⛺ Shelter & Sleep",
        items: [],
        tip: "Tip: Even if staying in refugios, always carry an emergency bivy or space blanket."
      };
      if (camping) {
        shelter.items = [
          "4-season tent (wind-rated)",
          "Sleeping bag rated to -5°C or lower",
          "Sleeping pad (insulated)",
          "Tent footprint / groundsheet"
        ];
      } else {
        shelter.items = [
          "Booking confirmations for refugios",
          "Lightweight sleeping bag liner",
          "Small pillow or inflatable pillow"
        ];
      }
      list.push(shelter);

      // Navigation
      const nav = {
        title: "🗺️ Navigation",
        items: [
          "Offline maps downloaded (Maps.me or Gaia GPS)",
          "Printed trail map as backup",
          "Compass"
        ],
        tip: "Tip: Cell service is nearly nonexistent on the W Trek — always have offline maps ready."
      };
      if (solo) nav.items.push("Personal locator beacon (PLB) or satellite communicator (e.g. Garmin inReach)");
      list.push(nav);

      // Food & Water
      const food = {
        title: "🍫 Food & Water",
        items: [
          `${duration * 3} trail snacks (bars, nuts, dried fruit)`,
          "2-liter water capacity (bottles or reservoir)",
          "Water filter or purification tablets",
          "Camp stove + fuel canister",
          "Lightweight cookpot",
          "Spork / utensils"
        ],
        tip: "Tip: Water sources are plentiful in Patagonia but always filter — glacial runoff can carry bacteria."
      };
      if (difficulty === "hard") food.items.push("Extra high-calorie emergency rations");
      list.push(food);

      // Health & Safety
      const health = {
        title: "🩹 Health & Safety",
        items: [
          "First aid kit",
          "Blister treatment (moleskin, Compeed)",
          "Sunscreen SPF 50+",
          "Lip balm with SPF",
          "Insect repellent",
          "Personal medications",
          "Ibuprofen / pain relief",
          "Hand sanitizer"
        ],
        tip: "Tip: The UV index in Patagonia is extremely high — reapply sunscreen every 2 hours."
      };
      if (altitude) health.items.push("Altitude sickness medication (consult a doctor)");
      list.push(health);

      // Gear & Accessories
      const gear = {
        title: "🔧 Gear & Accessories",
        items: [
          `${difficulty === "easy" ? "Day pack (20-30L)" : difficulty === "moderate" ? "Backpack (40-50L)" : "Backpack (55-70L)"}`,
          "Trekking poles (highly recommended)",
          "Headlamp + spare batteries",
          "Dry bags or pack liner",
          "Lightweight camp towel",
          "Sunglasses (UV protection)"
        ],
        tip: "Tip: A quality pack rain cover is worth its weight — Patagonian storms arrive fast and fierce."
      };
      if (rain) gear.items.push("Extra dry bags for electronics and documents");
      if (glacier) gear.items.push("Microspikes or crampons");
      list.push(gear);

      // Documents
      const docs = {
        title: "📄 Documents & Money",
        items: [
          "Passport",
          "Park entry ticket (Torres del Paine requires advance booking)",
          "Travel insurance documents",
          "Emergency contact list (printed)",
          "Chilean pesos / Argentine pesos (ATMs are scarce)"
        ],
        tip: "Tip: Book your Torres del Paine entry and refugio spots months in advance — they sell out fast."
      };
      list.push(docs);

      // Build HTML
      let html = '';
      list.forEach(cat => {
        html += `<div class="category">
          <h3>${cat.title}</h3>
          <ul>${cat.items.map(i => `<li>${i}</li>`).join('')}</ul>
          <p class="tip">${cat.tip}</p>
        </div>`;
      });

      document.getElementById('form-card').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      document.getElementById('result-content').innerHTML = html;
    }

    function resetForm() {
      document.getElementById('form-card').style.display = 'block';
      document.getElementById('result').style.display = 'none';
    }
  </script>

</body>
</html>
